    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Container Principal com a Imagem de Fundo */
        .bg-container {
            height: 100vh;
            width: 100%;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.1)), url('foto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Menu de Botões Superiores */
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 12px 5px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, background 0.3s;

            /* Estado inicial: invisível e deslocado para cima */
            opacity: 0;
            transform: translateY(-30px) scale(0.9);
        }

        /* Animação de entrada */
        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            60% {
                opacity: 1;
                transform: translateY(6px) scale(1.02);
            }
            80% {
                transform: translateY(-2px) scale(0.99);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Cada botão com delay diferente para efeito gradual */
        .btn:nth-child(1) {
            animation: fadeSlideIn 0.6s ease-out 0.3s forwards;
        }
        .btn:nth-child(2) {
            animation: fadeSlideIn 0.6s ease-out 0.55s forwards;
        }
        .btn:nth-child(3) {
            animation: fadeSlideIn 0.6s ease-out 0.8s forwards;
        }
        .btn:nth-child(4) {
            animation: fadeSlideIn 0.6s ease-out 1.05s forwards;
        }

        .btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.05) !important;
        }

        /* Nome no Rodapé */
        .footer-name {
            text-align: right;
            color: white;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            margin-right: 10px;
            letter-spacing: -1px;

            /* Animação do nome */
            opacity: 0;
            animation: nameFadeIn 1s ease-out 1.5s forwards;
        }

        @keyframes nameFadeIn {
            0% {
                opacity: 0;
                transform: translateX(40px);
                letter-spacing: 8px;
            }
            100% {
                opacity: 1;
                transform: translateX(0);
                letter-spacing: -1px;
            }
        }

        /* Ajuste para telas pequenas */
        @media (max-width: 600px) {
            .nav-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
            .footer-name {
                text-align: center;
                margin-right: 0;
            }
        }
    </style>
