<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Paula Moura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Container Principal com a Imagem de Fundo */
        .bg-container {
            height: 100vh;
            width: 100%;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.1)), url('foto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Menu de Botões Superiores */
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 12px 5px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.05);
        }

        /* Nome no Rodapé */
        .footer-name {
            text-align: right;
            color: white;
            font-size: clamp(2rem, 8vw, 4rem); /* Tamanho responsivo */
            font-weight: 800;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            margin-right: 10px;
            letter-spacing: -1px;
        }

        /* Ajuste para telas pequenas */
        @media (max-width: 600px) {
            .nav-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
            .footer-name {
                text-align: center;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <nav class="nav-buttons">
            <a href="https://privacy.com.br/Profile/privacydaaninha" target="_blank" class="btn">Privacy</a>
            <a href="https://t.me/privacydaaninha" target="_blank" class="btn">Telegram</a>
            <a href="https://www.instagram.com/ana_paulamouraguia" target="_blank" class="btn">Instagram</a>
            <a href="https://www.tiktok.com/@anapaulamouraguia" target="_blank" class="btn">TikTok</a>
        </nav>

        <h1 class="footer-name">Ana Paula Moura</h1>
    </div>

</body>
</html>
