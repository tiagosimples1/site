<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Arrais Amador & Motonauta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --deep: #0d1f3c;
    --ocean: #1a3a5c;
    --wave: #1e5799;
    --accent: #f5a623;
    --gold: #e8920a;
    --green: #27ae60;
    --red: #e74c3c;
    --white: #f0f4f8;
    --muted: #8fa3bc;
    --card: #122040;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(30,87,153,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(30,87,153,0.2) 0%, transparent 50%);
  }

  /* ===== TELA INICIAL ===== */
  #screen-home {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px; text-align: center;
  }
  .anchor-icon { font-size: 72px; margin-bottom: 16px; animation: bob 3s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .home-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 72px);
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), #fff 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .home-subtitle {
    font-size: 16px; color: var(--muted); margin-bottom: 40px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; width: 100%; max-width: 900px;
  }
  .section-btn {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 22px 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .section-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--wave), transparent);
    opacity: 0; transition: opacity 0.25s;
  }
  .section-btn:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .section-btn:hover::before { opacity: 0.3; }
  .section-btn .btn-type {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 6px; font-weight: 700;
  }
  .section-btn .btn-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px;
    color: var(--accent);
  }
  .section-btn .btn-count {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }
  .section-btn.prova .btn-name { color: var(--accent); }
  .section-btn.simulado .btn-name { color: #7ec8e3; }

  /* ===== TELA QUIZ ===== */
  #screen-quiz { display: none; min-height: 100vh; padding: 20px; }
  .quiz-header {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px; margin-bottom: 24px;
    background: var(--card); border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .back-btn {
    background: none; border: 2px solid rgba(255,255,255,0.2);
    color: var(--white); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700;
    transition: all 0.2s; flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quiz-title-bar {
    flex: 1;
  }
  .quiz-title-bar h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 24px;
    letter-spacing: 2px; color: var(--accent);
  }
  .score-row {
    display: flex; gap: 20px; margin-left: auto; flex-shrink: 0;
  }
  .score-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06); padding: 6px 14px;
    border-radius: 20px; font-weight: 800; font-size: 15px;
  }
  .score-chip.correct { color: var(--green); }
  .score-chip.wrong { color: var(--red); }

  /* Progress bar */
  .progress-container { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--wave), var(--accent)); transition: width 0.4s; border-radius: 3px; }

  /* Question card */
  .question-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 32px; margin-bottom: 20px;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .question-num {
    font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent); font-weight: 800; margin-bottom: 10px;
  }
  .question-text {
    font-size: 17px; line-height: 1.7; font-weight: 600;
  }

  /* Options */
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 14px 18px;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
    color: var(--white); width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent); background: rgba(245,166,35,0.08);
  }
  .option-label {
    flex-shrink: 0; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255,255,255,0.1);
    font-weight: 800; font-size: 13px;
  }
  .option-btn.correct-answer {
    border-color: var(--green) !important;
    background: rgba(39,174,96,0.15) !important;
  }
  .option-btn.correct-answer .option-label { background: var(--green); }
  .option-btn.wrong-answer {
    border-color: var(--red) !important;
    background: rgba(231,76,60,0.12) !important;
  }
  .option-btn.wrong-answer .option-label { background: var(--red); }
  .option-btn.dimmed { opacity: 0.45; }
  .option-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback-box {
    display: none; padding: 14px 20px; border-radius: 10px;
    font-weight: 700; font-size: 15px; margin-top: 16px;
    align-items: center; gap: 10px;
  }
  .feedback-box.show { display: flex; }
  .feedback-box.correct { background: rgba(39,174,96,0.15); border: 1px solid var(--green); color: var(--green); }
  .feedback-box.wrong { background: rgba(231,76,60,0.12); border: 1px solid var(--red); color: #ff8a7a; }

  /* Nav buttons */
  .nav-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px; }
  .nav-btn {
    padding: 12px 28px; border-radius: 10px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; cursor: pointer; transition: all 0.2s; border: none;
  }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--wave), var(--accent));
    color: #fff;
  }
  .nav-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.35); }
  .nav-btn.secondary {
    background: rgba(255,255,255,0.08); color: var(--white); border: 2px solid rgba(255,255,255,0.15);
  }
  .nav-btn.secondary:hover { border-color: var(--muted); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none !important; box-shadow: none !important; }

  /* ===== TELA RESULTADO ===== */
  #screen-result { display: none; min-height: 100vh; padding: 40px 20px; }
  .result-card {
    max-width: 640px; margin: 0 auto;
    background: var(--card); border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 48px 40px; text-align: center;
  }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 42px;
    letter-spacing: 3px; margin-bottom: 8px; color: var(--accent);
  }
  .result-section { font-size: 14px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .result-score {
    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, var(--green), #7fffc4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
  }
  .result-score.low {
    background: linear-gradient(135deg, var(--red), #ff9a7a);
    -webkit-background-clip: text; background-clip: text;
  }
  .result-score.mid {
    background: linear-gradient(135deg, var(--accent), #ffe082);
    -webkit-background-clip: text; background-clip: text;
  }
  .result-of { font-size: 18px; color: var(--muted); margin-top: 4px; margin-bottom: 8px; }
  .result-pct { font-size: 20px; font-weight: 800; margin-bottom: 32px; color: var(--white); }
  .result-bars { display: flex; gap: 12px; justify-content: center; margin-bottom: 36px; }
  .result-bar-item { flex: 1; max-width: 100px; }
  .result-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
  .result-bar-val { font-size: 22px; font-weight: 800; }
  .result-bar-val.c { color: var(--green); }
  .result-bar-val.e { color: var(--red); }
  .result-bar-val.s { color: var(--muted); }
  .result-message { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; padding: 0 20px; }
  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .result-btn {
    padding: 14px 28px; border-radius: 10px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; cursor: pointer; transition: all 0.2s; border: none;
  }
  .result-btn.primary { background: linear-gradient(135deg, var(--wave), var(--accent)); color: #fff; }
  .result-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.35); }
  .result-btn.secondary { background: rgba(255,255,255,0.08); color: var(--white); border: 2px solid rgba(255,255,255,0.15); }
  .result-btn.secondary:hover { border-color: var(--muted); }

  /* Detail list */
  .detail-toggle { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 700; letter-spacing: 1px; text-decoration: underline; margin-bottom: 20px; }
  .detail-list { display: none; text-align: left; margin-bottom: 24px; }
  .detail-list.open { display: block; }
  .detail-item { padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; border-left: 4px solid; }
  .detail-item.c { background: rgba(39,174,96,0.1); border-color: var(--green); }
  .detail-item.e { background: rgba(231,76,60,0.1); border-color: var(--red); }
  .detail-item .di-q { font-weight: 700; color: var(--white); margin-bottom: 3px; }
  .detail-item .di-a { font-size: 12px; color: var(--muted); }

  @media (max-width: 600px) {
    .quiz-header { flex-wrap: wrap; }
    .score-row { margin-left: 0; }
    .result-card { padding: 32px 20px; }
    .result-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="screen-home">
  <div class="anchor-icon">⚓</div>
  <h1 class="home-title">Arrais & Motonauta</h1>
  <p class="home-subtitle">Banco de questões • Treine para sua prova</p>
  <div class="section-grid" id="section-grid"></div>
</div>

<!-- TELA QUIZ -->
<div id="screen-quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Voltar</button>
    <div class="quiz-title-bar">
      <h2 id="quiz-section-title">PROVA 1</h2>
    </div>
    <div class="score-row">
      <div class="score-chip correct">✓ <span id="score-correct">0</span></div>
      <div class="score-chip wrong">✗ <span id="score-wrong">0</span></div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-info">
      <span id="q-counter">Pergunta 1 de 40</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-num" id="q-num">QUESTÃO 1</div>
    <div class="question-text" id="q-text"></div>
  </div>

  <div class="options-list" id="options-list"></div>

  <div class="feedback-box" id="feedback-box">
    <span id="feedback-icon"></span>
    <span id="feedback-text"></span>
  </div>

  <div class="nav-row">
    <button class="nav-btn secondary" id="btn-prev" onclick="prevQ()">← Anterior</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextQ()">Próxima →</button>
    <button class="nav-btn primary" id="btn-finish" onclick="showResult()" style="display:none">Ver Resultado 🏁</button>
  </div>
</div>

<!-- TELA RESULTADO -->
<div id="screen-result">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title">Resultado</div>
    <div class="result-section" id="result-section-name"></div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-of" id="result-of">de 0 questões</div>
    <div class="result-pct" id="result-pct">0% de acerto</div>
    <div class="result-bars">
      <div class="result-bar-item">
        <div class="result-bar-label">Acertos</div>
        <div class="result-bar-val c" id="rb-correct">0</div>
      </div>
      <div class="result-bar-item">
        <div class="result-bar-label">Erros</div>
        <div class="result-bar-val e" id="rb-wrong">0</div>
      </div>
      <div class="result-bar-item">
        <div class="result-bar-label">Puladas</div>
        <div class="result-bar-val s" id="rb-skip">0</div>
      </div>
    </div>
    <div class="result-message" id="result-message"></div>
    <button class="detail-toggle" onclick="toggleDetail()">▼ Ver detalhes por questão</button>
    <div class="detail-list" id="detail-list"></div>
    <div class="result-actions">
      <button class="result-btn primary" onclick="restartQuiz()">🔄 Refazer esta prova</button>
      <button class="result-btn secondary" onclick="goHome()">🏠 Escolher outra</button>
    </div>
  </div>
</div>

<script>
const QUIZ_DATA = {"PROVA 1": [{"num": 1, "text": "Um veleiro e uma lancha vinham navegando em rumos cruzados, tendo preferência de passagem, o veleiro não manobrou e esperou que lancha guinasse, enquanto se aproximava rapidamente dela. Houve um abalroamento entre as duas embarcações. Podemos concluir que:", "options": {"1": "As duas deveriam ter guinado para os bordos opostos conforme manda a regra.", "2": "Apesar da lancha ter errado por não manobrar, para evitar o acidente, o veleiro não pode ser isentado de culpa pois, a embarcação que tem preferência deverá manobrar para evitar o abalroamento, caso a outra, obrigada a manobrar, não o faça.", "3": "A lancha estava errada e, portanto, deveria ter manobrado com antecedência, porém o veleiro deve se manter longe de outras embarcações a motor.", "4": "O veleiro estava certo e, portanto, não teve culpa nenhuma no acidente, cabendo total responsabilidade à lancha.", "5": "A lancha estava certa e, portanto, não teve culpa nenhuma do acidente, cabendo total responsabilidade ao veleiro."}, "answer": 2}, {"num": 2, "text": "Uma embarcação à vela tem preferência em relação à:", "options": {"1": "Uma embarcação com capacidade de manobra restrita devido ao seu calado.", "2": "Uma embarcação sem governo.", "3": "Uma embarcação a motor.", "4": "Uma embarcação engajada na pesca.", "5": "Uma embarcação com capacidade de manobra restrita."}, "answer": 3}, {"num": 3, "text": "Uma embarcação, à noite, exibindo duas luzes circulares encarnadas, dispostas em linha verMcal, onde melhor possam ser vistas, será uma embarcação:", "options": {"1": "Fundeada.", "2": "Com mergulhadores na área.", "3": "No canal.", "4": "Com manobras restritas.", "5": "Sem governo."}, "answer": 5}, {"num": 4, "text": "Embarcações de comprimento inferior 7 metros, com relação às luzes de navegação, quando fundeadas fora das proximidades de um canal estreito, uma via de acesso, fundeadouro ou rotas normalmente uMlizadas por outras embarcações estarão:", "options": {"1": "Obrigadas a acender uma lanterna elétrica de luz vermelha mostrada antes de um abalroamento.", "2": "Obrigadas a manter vigilância pronta para sinalizar caso necessário.", "3": "Obrigadas a acender uma lanterna elétrica de luzes combinadas verde e vermelha mostraria na iminência de um abalroamento.", "4": "Obrigadas a acender com um isqueiro, papel ou pano para fazer uma fogueira a bordo de forma a ser visível por outra embarcação.", "5": "Desobrigadas de exibir as luzes de fundeio."}, "answer": 5}, {"num": 5, "text": "O termo “embarcação com capacidade de manobra restrita” designa uma embarcação que:", "options": {"1": "Está com seu leme inoperante.", "2": "Devido à natureza dos seus serviços, se encontra restrita na sua capacidade de manobrar.", "3": "Está sem propulsão.", "4": "Está com avarias na âncora.", "5": "Está com limitação de velocidade."}, "answer": 2}, {"num": 6, "text": "O balizamento de interior de porto obedecerá às regras deZnidas e deverá ser uMlizado, pelo navegante, com:", "options": {"1": "Orientação para uma navegação segura.", "2": "Uma possibilidade de uso, caso concorde.", "3": "Uma rota a ser seguida, obrigatoriamente, por qualquer embarcação.", "4": "Apenas um auxílio nas manobras de socorro de embarcações, em águas restritas.", "5": "Uma separação de locais e zonas de tráfego dos canais."}, "answer": 1}, {"num": 7, "text": "Os sinais de perigo isolado servem para indicar:", "options": {"1": "Perigos isolados ainda não cartografados.", "2": "Perigos isolados de tamanho limitado, cercados por pedras.", "3": "Pedras submersas.", "4": "Perigos isolados ilimitados.", "5": "Perigos isolados de tamanho limitado, cercado por águas navegáveis."}, "answer": 5}, {"num": 8, "text": "No balizamento de uma hidrovia um sinal “+” signiZca:", "options": {"1": "Perigo.", "2": "Manter a navegação na margem.", "3": "Bifurcação de canal.", "4": "Trocar de margem.", "5": "Seguir pelo meio do canal."}, "answer": 1}, {"num": 9, "text": "Os sinais cardinais podem ser usados, exceto:", "options": {"1": "Para indicar que as águas mais profundas estão no quadrante designado.", "2": "Para chamar atenção de um ponto notável.", "3": "Para indicar uma região que não é segura para a navegação.", "4": "Para indicar o quadrante seguro para se navegar.", "5": "Para delimitar a área em que o navegador deve se limitar a passar."}, "answer": 2}, {"num": 10, "text": "As âncoras são peças metálicas que servem para:", "options": {"1": "Fundear em qualquer profundidade.", "2": "Auxiliar a fundear nos locais de atracação.", "3": "Prender no fundo (unhar), para permiMr que a embarcação garre (se solte).", "4": "Prender no fundo (unhar), para permiMr que a embarcação se mantenha fundeada.", "5": "Auxiliar a movimentar as embarcações nos fundeadouros de boa tença (Mpo de fundo)."}, "answer": 4}, {"num": 11, "text": "Havendo corrente de maré no local de atracação de uma embarcação, nós devemos aproveitar seu efeito e:", "options": {"1": "Atracar contra a corrente, passando-se em cabo dizendo (na direção) para vante e outro dizendo para ré.", "2": "Nunca devemos atracar contra a corrente.", "3": "Esperar a corrente cessar para evitar seu efeito, que é prejudicial à manobra de atracação.", "4": "Atracar com um cabo dizendo para vante e outro dizendo ré.", "5": "Atracar a favor da corrente, para aproveitar seu efeito de encostar a embarcação ao cais."}, "answer": 1}, {"num": 12, "text": "Basicamente o leme se divide em:", "options": {"1": "Cabeça, corpo e dobradiças.", "2": "Madre, dobradiças e porta.", "3": "Madre, cepo e porta.", "4": "Corpo, anete e cepo.", "5": "Cabeça, anete e haste."}, "answer": 3}, {"num": 13, "text": "Para fundear devemos:", "options": {"1": "Largar a âncora com seguimento avante.", "2": "Inverter a máquina e, quando a embarcação esMver caindo a ré, largar a âncora.", "3": "Largar a âncora e dar máquina adiante.", "4": "Quando a embarcação esMver sem segmento, largar a âncora e dar máquina devagar adiante.", "5": "Parar a máquina e largar a âncora."}, "answer": 2}, {"num": 14, "text": "ExMntores portáteis são:", "options": {"1": "Equipamentos de combate a incêndio, que uMlizam os agentes exMntores para apagar o fogo.", "2": "Equipamentos que uMlizam o comburente da reação, para apagar o fogo", "3": "Equipamentos de apoio ao controle de avarias.", "4": "Equipamentos de exMnção de incêndios, somente de classe A."}, "answer": 1}, {"num": 15, "text": "O incêndio da classe A ocorre em:", "options": {"1": "Materiais elétricos.", "2": "Materiais sólidos iniamáveis.", "3": "Líquidos iniamáveis.", "4": "Gases.", "5": "Metais iniamáveis."}, "answer": 2}, {"num": 16, "text": "O vapor de água pode ser uMlizado como agente exMntor, por:", "options": {"1": "Resfriamento.", "2": "Reação térmica.", "3": "Aquecimento.", "4": "ReMrada do combuslvel.", "5": "Abafamento."}, "answer": 5}, {"num": 17, "text": "Os incêndios que envolvem metais combuslveis como sódio, potássio, magnésio, Mtânio e alumínio são denominados:", "options": {"1": "Incêndios classe “B”.", "2": "Incêndios classe “C”.", "3": "Incêndios classe “D”.", "4": "Incêndios classe “E”.", "5": "Incêndios classe “A”."}, "answer": 3}, {"num": 18, "text": "Não se deve uMlizar o colete salva-vidas, nas situações abaixo, exceto:", "options": {"1": "Para fazer demonstrações.", "2": "Como travesseiro.", "3": "Como encosto.", "4": "Como apoio.", "5": "Como brinquedo."}, "answer": 1}, {"num": 19, "text": "Em caso de náusea, tomar logo o medicamento contra enjoo e manter-se deitado. O vômito representa:", "options": {"1": "A grande perda de água para o organismo.", "2": "Mal estar para os demais náufragos.", "3": "Melhoria do mareio.", "4": "Incapacidade de entrar no revezamento.", "5": "Recuperação do organismo."}, "answer": 1}, {"num": 20, "text": "A falta de funcionamento dos intesMnos consMtui fenômeno comum em náufragos dada a:", "options": {"1": "Adrenalina no sangue.", "2": "Falta de água no organismo.", "3": "Exiguidade da alimentação.", "4": "Abundância de água.", "5": "Grande variação de temperatura ambiente."}, "answer": 3}, {"num": 21, "text": "AS balsas são conMdas em casulos de Zbra de vidro que Zcam dispostos em cabides próprios e localizados nos conveses abertos. Para sua uMlização basta:", "options": {"1": "Lançá-lo ao mar e colher o cabo até que seja encontrada uma certa resistência, quando deverá ser dado um puxão mais forte, o que liberará a descarga das ampolas de CO2 que iniarão a balsa em menos de 30 segundos.", "2": "Abrir o casulo, reMrar a balsa e lança-la ao mar.", "3": "Lançar o casulo ao mar que ele abrirá sozinho e a balsa irá iniar automaMcamente após 10min devido a reação química do propelente que reagirá com a água do mar.", "4": "Abrir o casulo, reMrar a balsa e enchê-la e jogá-la ao mar.", "5": "Lançar o casulo ao mar que ele se abrirá sozinho e a balsa irá iniar automaMcamente."}, "answer": 1}, {"num": 22, "text": "A bordo de seu barco de lazer (motorizado), qual o combuslvel mais perigoso e mais propenso a se incendiar sendo, portanto, moMvo de cuidados especiais?", "options": {"1": "Painéis elétricos.", "2": "Medira.", "3": "Papéis.", "4": "Fibra de vidro.", "5": "Combuslveis líquidos."}, "answer": 5}, {"num": 23, "text": "A quanMdade máxima de pessoas autorizadas a embarcar, incluindo a tripulação é chamada de:", "options": {"1": "Capacidade máxima.", "2": "Tripulação.", "3": "Guarnição.", "4": "EfeMvo.", "5": "Lotação."}, "answer": 5}, {"num": 24, "text": "Ao nos depararmos com um náufrago com sintomas de hipotermia devemos de imediato trocar suas roupas molhadas e:", "options": {"1": "Aquecê-lo de forma lenta e gradual.", "2": "Ministrar bebidas alcoólicas.", "3": "Fazer massagens para aquecê-lo.", "4": "Levá-lo para perto de fonte de calor forte.", "5": "Aplicar insulina e adrenalina."}, "answer": 1}, {"num": 25, "text": "As medidas que adotamos em caso de um acidente a bordo para evitar o agravamento de acidentado enquanto nosso barco busca socorro médico deZn  presa ao fundo e está deslizando pelo mesmo, permiMndo que nosso barco fundeado saia do lugar, diz-se que a âncora:", "options": {"1": "Garrou.", "2": "Soltou.", "3": "Unhou.", "4": "Largou.", "5": "Desenterrou."}, "answer": 1}, {"num": 32, "text": "Que Mpo de exMntor é o mais indicado para o combate a um incêndio em equipamentos energizados?", "options": {"1": "Água.", "2": "Espuma mecânica.", "3": "Espuma química.", "4": "Gás carbônico.", "5": "Pó químico."}, "answer": 4}, {"num": 33, "text": "Todo aquele que é transportado pela embarcação, não fazendo parte da tripulação e nem sendo proZssional não-tripulante prestando serviço proZssional a bordo, é chamado de:", "options": {"1": "Carga viva.", "2": "Passageiro.", "3": "Comandante.", "4": "Tripulante.", "5": "ClandesMno."}, "answer": 2}, {"num": 34, "text": "Uma embarcação com mais de 12m de comprimento, quando praMcando navegação em área interior (águas abrigadas) deve dispor a bordo de:", "options": {"1": "Nenhuma boia circular.", "2": "Duas boias circulares.", "3": "Uma boa circular.", "4": "Quatro boias circulares.", "5": "Três boias circulares."}, "answer": 2}, {"num": 35, "text": "Uma embarcação de esporte e recreio inscrita e classiZcada para navegação interior se for iagrada navegando em área de navegação oceânica será:", "options": {"1": "Autuada e deverá regressar (interromper singradura).", "2": "Autuada e seu comandante será deMdo.", "3": "Autuada e apreendida.", "4": "Inspecionada e apreendida.", "5": "Autuada, incorporada aos bens da União e leiloada."}, "answer": 3}, {"num": 36, "text": "De acordo com o Regulamento Internacional Para Evitar Abalroamentos no Mar (RIPEAM), em uma embarcação que navega em um canal estreito em que a ultrapassagem não é segura sem a concordância de ambos, qual é a sequência correta de apitos para indicar a intenção de ultrapassagem de outra embarcação por bombordo dela?", "options": {"1": "Um longo, um longo e um curto.", "2": "Um longo e um curto.", "3": "Um longo, um curto, um longo e um curto.", "4": "Um curto, um curto, um longo e um longo.", "5": "Um longo, um longo, um curto e um curto."}, "answer": 5}, {"num": 37, "text": "Considerando como linha de base, a linha de arrebentação das ondas, ou no caso de lagos e lagoas onde se inicia o espelho d’água, assinale a alternaMva que representa o limite correto em áreas com frequência de banhistas.", "options": {"1": "Embarcações de propulsão a motor poderão trafegar a parMr de duzentos (200) metros da linha de base.", "2": "Embarcações a vela não poderão se aproximar da linha de base para fundear.", "3": "As embarcações de aluguel (banana-boat, plana sub, etc.) que operam nas imediações das praias e margens, não necessitam ter suas áreas de operação delimitadas.", "4": "Embarcações uMlizando propulsão a remo ou a vela poderão trafegar para fundear desde que na diagonal e velocidade não superior a cinco (5) nós."}, "answer": 1}, {"num": 38, "text": "Considerando as caracterísMcas abaixo descritas em itálico, assinale a alternaMva que corresponde ao sinal náuMco. É um sinal cego ou luminoso. É dotado de marca de tope, duas esferas pretas, uma sobre a outra e possui cor preta, com uma ou mais faixas horizontais encarnadas (vermelhas).", "options": {"1": "Sinal de Perigo isolado.", "2": "Sinal Cardinal.", "3": "Sinal Especial.", "4": "Sinal Lateral.", "5": "Sinais de Águas Seguras."}, "answer": 1}, {"num": 39, "text": "A melhor maneira de saltar na água, uMlizando o colete salva-vidas, é com:", "options": {"1": "As pernas esMcadas e os pés juntos.", "2": "Apenas a mão direita no nariz.", "3": "As pernas abertas, a mão direita no nariz e a mão esquerda no ombro.", "4": "Os pés juntos e a perna dobrada.", "5": "A mão direita no nariz e os pés separados."}, "answer": 1}, {"num": 40, "text": "Em áreas próximas aos vertedouros das hidroelétricas é recomendado o uso de cordões de boias para indicar ao navegante a área a ser evitada. Tais boias devem ser pintadas de:", "options": {"1": "Amarelo.", "2": "Verde.", "3": "Encarnado e branco.", "4": "Encarnado e preto.", "5": "Encarnado."}, "answer": 1}], "PROVA 2": [{"num": 1, "text": "Uma luz amarela, com as mesmas caracterísMcas da luz de alcançado exceto a cor, e por cima desta, chama-se:", "options": {"1": "Luz de reboque.", "2": "Luz de ré.", "3": "Luz de mastro.", "4": "Luz de popa.", "5": "Luz de bordo."}, "answer": 1}, {"num": 2, "text": "De acordo com o RIPEAM, os sinais sonoros que podem ser emiMdos por apitos, buzinas ou ainda sinos, são uMlizados em três situações:", "options": {"1": "Manobra, risco de abalroamento e em canais estreitos.", "2": "Manobra, risco de abalroamento e em baixa visibilidade.", "3": "Manobra, advertência e risco de abalroamento.", "4": "Manobra, perigos diversos e em canais estreitos.", "5": "Manobra, advertência e em baixa visibilidade."}, "answer": 5}, {"num": 3, "text": "O sinal lateral de canal que Zca a boreste de quem entra no porto tem a cor:", "options": {"1": "Preta e encarnada.", "2": "Branca.", "3": "Verde.", "4": "Preta e branca.", "5": "Encarnada."}, "answer": 5}, {"num": 4, "text": "Num pilar de uma ponte sobre um rio navegável, observou-se um retângulo pintado de verde, isto signiZca que o:", "options": {"1": "Tráfego está proibido.", "2": "Tráfego está sujeito a interrupção no período de seca.", "3": "Tráfego está à esquerda de quem desce e à direita de quem sobe o rio.", "4": "Tráfego está à direita de quem desce e à esquerda de quem sobre o rio.", "5": "Tráfego é permiMdo com senMdo único."}, "answer": 3}, {"num": 5, "text": "É um fator que não altera as condições de manobra da embarcação:", "options": {"1": "Número de propulsores.", "2": "Ocorrência de corrente de maré.", "3": "Condições do vento.", "4": "Tipo de leme.", "5": "Temperatura da água."}, "answer": 5}, {"num": 6, "text": "numa atracação, com vento ou corrente perpendicular ao cais, com aproximação a barlavento, deverei aproximar com a embarcação:", "options": {"1": "Com ângulo de 90º com ptions": {"1": "EsMcada.", "2": "Tanto faz.", "3": "Inclinada.", "4": "A mais natural possível.", "5": "Retraída."}, "answer": 4}, {"num": 12, "text": "A condição na qual o corpo humano perde calor mais rapidamente do que pode ser produzido chama-se:", "options": {"1": "Hemorragia.", "2": "Hiperglicemia.", "3": "Choque.", "4": "Sufocação.", "5": "Hipotermia."}, "answer": 5}, {"num": 13, "text": "Para que serve o colete salva-vidas que deverá ser guardado a bordo na quanMdade exigida pela Legislação?", "options": {"1": "Para ser vesMdo, no caso de incêndio a bordo, como roupa de proteção.", "2": "Para ser vesMdo em caso de práMcas desporMvas náuMcas.", "3": "Para ser uMlizado, como material de controle de avarias, no caso de acidentes com o casco da embarcação.", "4": "Para ser vesMdo, no caso de ter que se abandonar a embarcação, para que o náufrago iutue com ele.", "5": "Para ser uMlizado como meio de iutuação, quando o passageiro desejar pular na água para nadar um pouco."}, "answer": 4}, {"num": 14, "text": "O abandono do barlavento se jusMZca por ser onde as manchas de óleo terão menor extensão e:", "options": {"1": "A embarcação protegerá a descida do pessoal.", "2": "As balsas Zcarão mais protegidas das ondas.", "3": "O abaMmento por efeito do vento fará com que a embarcação não se afaste.", "4": "O pessoal Zcará protegido do vento.", "5": "O abaMmento por efeito do vento tornará mais rápido o afastamento da embarcação."}, "answer": 5}, {"num": 15, "text": "o número de coletes a bordo deve atender:", "options": {"1": "A todos os passageiros adultos.", "2": "Ao limite máximo de pessoas a abordo.", "3": "A 50% do limite máximo de pessoas a bordo.", "4": "A todos os passageiros.", "5": "A todos os membros da tripulação."}, "answer": 2}, {"num": 16, "text": "O disposiMvo de iluminação das balsas, quando houver, é alimentado por:", "options": {"1": "Força humana", "2": "Pilhas alcalinas constantes do material de salvatagem.", "3": "Lanternas de antepara existentes no interior da balsa.", "4": "Bateria aMvada automaMcamente pela água salgada.", "5": "Pilhas de níquel-cádmio constantes do material de salvatagem."}, "answer": 4}, {"num": 17, "text": "A cobertura da balsa salva-vidas é de:", "options": {"1": "Fibra de vidro para resisMr às intempéries.", "2": "Cor alaranjada para facilitar o avistamento.", "3": "Cor azul para combinar com o mar.", "4": "Lona amarela para afastar tubarões.", "5": "Cor branca para aquecer pouco."}, "answer": 2}, {"num": 18, "text": "QuanMdade mínima de tripulantes necessária a operar, com segurança, a embarcação:", "options": {"1": "Tripulação", "2": "Lotação de segurança.", "3": "Lotação.", "4": "Tripulação de segurança.", "5": "Lotação mínima."}, "answer": 4}, {"num": 19, "text": "a navegação realizada em hidrovias interiores, assim considerados rios, lagos, canais, lagoas, baias, angras, enseadas e áreas maríMmas abrigadas é classiZcada como:", "options": {"1": "Lacustre.", "2": "Mar fechado.", "3": "Interior.", "4": "Água doce.", "5": "Fluvial."}, "answer": 3}, {"num": 20, "text": "O comandante, no exercício de suas funções e para a garanMa da segurança das pessoas, da embarcação e da carga transportada, pode:", "options": {"1": "Ordenar o desembarque de qualquer pessoa.", "2": "Multar qualquer tripulante ou passageiro.", "3": "Dispensar o práMco.", "4": "Encalhar a embarcação.", "5": "Abandonar o barco."}, "answer": 1}, {"num": 21, "text": "Os coletes salva-vidas classe III são exigidos nas embarcações de esporte e recreio:", "options": {"1": "Apenas para as de alto mar.", "2": "Exceto para as de navegação interior e costeira.", "3": "Apenas para as de navegação costeira.", "4": "Apenas para as de interior de porto.", "5": "Para as de alto mar e navegação costeira."}, "answer": 4}, {"num": 22, "text": "Segundo a RLESTA, a navegação realizada entre portos brasileiros e estrangeiros é:", "options": {"1": "Ortodrômica.", "2": "Costeira.", "3": "Longo curso.", "4": "Loxodrômica.", "5": "Cabotagem.  da boia.", "4": "Ao norte da boia.", "5": "A boreste da boia."}, "answer": 1}, {"num": 30, "text": "Assinale qual das infrações abaixo será passível da mais alta penalidade (multa do grupo G) prevista no Decreto 2.596/98 (RLESTA):", "options": {"1": "Ceder a embarcação para condução de menores.", "2": "Excesso de passageiros ou carga.", "3": "Trafegar em área de banhista.", "4": "Conduzir a embarcação em baixa velocidade.", "5": "Condução de barcos sem habilitação especíZca."}, "answer": 2}, {"num": 31, "text": "Deve-se pular de uma embarcação que está naufragando:", "options": {"1": "De pé, com as mãos segurando os joelhos.", "2": "De pé, com os brações voltados pra baixo, colados ao corpo.", "3": "De pé, com uma das mãos segurando o nariz e a outra mão sobre o ombro oposto.", "4": "De pé, com os braços abertos.", "5": "De pé, com os braços voltados para cima, em prolongamento ao corpo."}, "answer": 3}, {"num": 32, "text": "NÃO devemos combater o fogo sotavento, pois:", "options": {"1": "Podemos ser aMngidos pelas chamas ou fumaça do incêndio levadas pelo vento.", "2": "A água uMlizada será menos aproveitada.", "3": "Ficaremos distantes do foco do incêndio.", "4": "O vento diminuirá as chamas, mas aumentará a fumaça.", "5": "Podemos ser empurrados (levados) pelo vento para cima do incêndio."}, "answer": 1}, {"num": 33, "text": "Os primeiros socorros são ações imediatas que visam:", "options": {"1": "Aplicar medicamentos que ajudarão a recuperação dos acidentados em uma semana.", "2": "Salvar a vida humana: aliviar dores e evitar complicações em feridos e acidentados.", "3": "Curar as pessoas acidentadas, diminuindo suas dores e complicações.", "4": "Restabelecer as pessoas, para que conMnuem aproveitando a viagem a bordo.", "5": "Realizar procedimentos de enfermaria, o que dispensará o apoio médico posterior."}, "answer": 2}, {"num": 34, "text": "Podem ser ministrados água ou líquidos não alcóolicos para o queimado, exceto se ele:", "options": {"1": "EsMver senMnd do duas luzes circulares, encarnadas e em linha verMcal, será:", "options": {"1": "Uma embarcação sem governo.", "2": "Uma embarcação engajada na pesca que não seja de arrasto.", "3": "Uma embarcação engajada na pesca de arrasto.", "4": "Uma embarcação de praMcagem.", "5": "Uma embarcação rebocando."}, "answer": 1}, {"num": 4, "text": "As embarcações de esporte e/ou recreio, sem propulsão a motor, com menos de 55m de comprimento, à noite, estão:", "options": {"1": "Proibidas de navegar.", "2": "Dispensadas de exibir qualquer luz à noite.", "3": "Obrigadas a exibir uma luz branca circular a noite.", "4": "Obrigadas a ter pelo menos as luzes de bordo.", "5": "Dispensadas de usar buzina ou outro disposiMvo que a subsMtua."}, "answer": 3}, {"num": 5, "text": "O que se entende por balizamento?", "options": {"1": "É o conjunto de boias e faróis para guiar os navios que estão perdidos.", "2": "É o conjunto de boias, faróis e disposiMvos para orientar embarcações a vela e a remo.", "3": "É o conjunto de boias, pilares e balizas, que servem para indicar um caminho em terra desde a praia até o interior.", "4": "É o conjunto de boias, pilares e balizas, que servem para indicar um caminho, perigos ou limites, somente para embarcações a motor.", "5": "É o conjunto de boias, pilares e balizas, que servem para indicar um caminho, perigos ou limites em uma área no mar."}, "answer": 5}, {"num": 6, "text": "O balizamento de canal preferencial, temas cores:", "options": {"1": "Preta e amarela.", "2": "Verde e encarnada.", "3": "Branca e encarnada com listras verMcais.", "4": "Branca e preta.", "5": "Branca e encarnada."}, "answer": 2}, {"num": 7, "text": "As boias do balizamento podem ser quanto a aresenação de luzes::", "options": {"1": "brilhantes e opacas.", "2": "Sem marcas de tope.", "3": "Esfericas.", "4": "Cegas ou luminosas.", "5": "Azuis ou branca."}, "answer": 4}, {"num": 8, "text": "Uma bóia a noite emiMndo uma luz amarela podera signiZcar:", "options": {"1": "area de recreação.", "2": "uma bifurcação de canal.", "3": "um perigo isolado.", "4": "aguas seguras.", "5": "limites de canal."}, "answer": 1}, {"num": 9, "text": "As marcas de tope do sinal cardinal norte são:", "options": {"1": "dois cones pretos, lada a lado com os verMces para cima.", "2": "dois cones pretos, um sobre o outro ponta a ponta.", "3": "dois cones pretos, um sobre o outro com os verMces para baixo.", "4": "dois cones pretos, um sobre o outro com os verMces para cima.", "5": "dois cones pretos, um sobre o outro base a base."}, "answer": 4}, {"num": 10, "text": "A regra simples para se determinar a quanMdade de amarra que se usa para fundear normalmente é:", "options": {"1": "no minimo 4 vezes a profundidade local.", "2": "no minimo 2 vezes a profundidade local.", "3": "no minimo 3 vezes a profundidade local.", "4": "no minimo 1,5 vezes a profundidade local.", "5": "no minimo 6 vezes a profundidade local."}, "answer": 3}, {"num": 11, "text": "A ancora mais comum a bordo das embarcações de esporte e recreio é a:", "options": {"1": "busca vida.", "2": "almirantado", "3": "fateixa", "4": "danforth", "5": "patente"}, "answer": 4}, {"num": 12, "text": "Com incêndio a bordo, qual seu posicionamento para dar o combate as chammas:", "options": {"1": "Mantenho-me a bombordo a favor da fumaça.", "2": "Mantenho-me a barlavento das chamas e fmaça:", "3": "Mantenho-me a sotavento das chamas e fmaça.", "4": "Mantenho-me na proa ou na popa.", "5": "Mantenho-me a meia embarcação."}, "answer": 2}, {"num": 13, "text": "Os incêndios que ocorrem em equipamentos elétricos quando energizados são denominados:", "options": {"1": "Incêndios classe “B”.", "2": "Incêndios classe “C”.", "3": "Incêndios classe “D”.", "4": "Incêndios classe “E”.", "5": "Incêndios classe “A”."}, "answer": 2}, {"num": 14, "text": "Analisando os combuslveis sólidos, podemos dizer que:", "options": {"1": "A velocidade da combustão, independe da fragmentação do material.", "2": "Quanto maior a fragmentação do material, menor será a velocidade da combustão.", "3": "Quanto maior a fragmentação do material, maior será a velocidade da combustão.", "4": "Quanto menor a fragmentação do material, maior será a velocidade da combustão.", "5": "A velocidade da combustão aumentará a fragmentação do material."}, "answer": 3}, {"num": 15, "text": "O mais eZciente método de combater incêndios é:", "options": {"1": "UMlizar gás halon.", "2": "UMlizar água em abundância.", "3": "UMlizar pó químico.", "4": "Eliminar um dos elementos do triângulo do fogo.", "5": "UMlizar dióxido de carbono."}, "answer": 4}, {"num": 16, "text": "O agente exMntor para incêndios classe “D” é:", "options": {"1": "CO2", "2": "Espuma mecânica.", "3": "Espuma química.", "4": "Água.", "5": "Pó químico seco."}, "answer": 5}, {"num": 17, "text": "Caso o afogado não esteja respirando, qual o procedimento correto?", "options": {"1": "Deitá-lo de lado para que a água seja expelida, limpar sua boca de objetos que obstruam sua respiração e realizar a respiração boca a boca.", "2": "Deitá-lo de lado para que a água seja expelida e iniciar a massagem cardíaca externa.", "3": "Sentá-lo e fazer respiração boca a boca.", "4": "Deitá-lo de frente e iniciar massagem cardíaca externa.", "5": "Deitá-lo de barriga para baixo e fazer massagem nas costas."}, "answer": 1}, {"num": 18, "text": "É passível de ocorrer a apreensão da embarcação, quando:", "options": {"1": "EsMver sem a dotação de exMntores.", "2": "Trafegar em áreas de segurança.", "3": "EsMver em péssimo estado de conservação.", "4": "Foi uMlizada comercialmente.", "5": "Todas as demais opções."}, "answer": 5}, {"num": 19, "text": "ExMntores uMlizados em incêndios classe “B” são idenMZcados por meio de:", "options": {"1": "Uma estrela amarela.", "2": "Um triângulo verde.", "3": "Um quadrado vermelho.", "4": "Um triângulo azul.", "5": "Um círculo azul."}, "answer": 3}, {"num": 20, "text": "A bordo de um barco de lazer navegando o tripulante responsável pela operação e manute ina organizada ou grupo de escoteiros.", "5": "08 anos e deverá ser Zliado a um clube náuMco, marina organizada ou grupo escoteiros do mar."}, "answer": 5}, {"num": 15, "text": "Considerando as áreas seleMvas para navegação, deZnidas pela NORMAM-03, as embarcações uMlizando propulsão a remo ou a vela poderão trafegar a parMr de:", "options": {"1": "50m da linha base.", "2": "20m da praia.", "3": "150m da praia.", "4": "100m da linha base.", "5": "200m da linha base."}, "answer": 4}, {"num": 16, "text": "Considerando as áreas seleMvas para a navegação, deZnidas pela NORMAM-03, as embarcações de propulsão a motor, reboque de esqui aquáMco, paraquedas e painéis de publicidade poderão trafegar a parMr de:", "options": {"1": "100m da linha base.", "2": "300m da linha base.", "3": "400m da linha base.", "4": "200m da linha base.", "5": "500m da linha base."}, "answer": 4}, {"num": 17, "text": "Uma queimadura de 2º grau é caracterizada:", "options": {"1": "Pela vermelhidão da pele.", "2": "Pela presença de bolhas e exudação.", "3": "Por não ocorrer destruição da pele.", "4": "Por ser indolor.", "5": "Pela total destruição da pele."}, "answer": 2}, {"num": 18, "text": "Um exemplo de combuslvel sem comburente seria:", "options": {"1": "Carbono.", "2": "Hidrogênio.", "3": "Madeira.", "4": "Oxigênio.", "5": "Nitrogênio."}, "answer": 3}, {"num": 19, "text": "As boias dos sinais cardinais são as seguintes:", "options": {"1": "Perigo conjunto.", "2": "Norte, sul, leste e oeste.", "3": "Norte e sul.", "4": "Perigo isolado.", "5": "Boreste e bombordo."}, "answer": 2}, {"num": 20, "text": "As partes curvas do costado de uma embarcação, nas imediações da popa, por boreste ou por bombordo, são chamadas de:", "options": {"1": "Bocas", "2": "Alhetas", "3": "Bochechas", "4": "Longarinas", "5": "Pés de galinha"}, "answer": 2}, {"num": 21, "text": "De acordo com a NORMAM-03, estão dispensados de apresentar habilitação náuMca apenas:", "options": {"1": "Os condutores de embarcações menores  externa de calor."}, "answer": 3}, {"num": 26, "text": "Em que ponto do barco deve ser Zxada (presa) a amarra quando o barco está fundeado?", "options": {"1": "Na proa.", "2": "Na popa.", "3": "Na meia-nau.", "4": "Em qualquer lugar Zrme da superestrutura do barco.", "5": "A meio-navio."}, "answer": 1}, {"num": 27, "text": "Em um barco com dois motores (dois eixos e dois hélices), qual será a tendência da proa se uma das hélices esMver numa rotação inferior a outra?", "options": {"1": "A proa irá Zcar instável, variando.", "2": "A proa tenderá a ir para o bordo da hélice que está com menor rotação.", "3": "A proa tenderá a seguir uma linha reta.", "4": "A proa tenderá a ir para o mesmo bordo da hélice que está com maior rotação.", "5": "Não haverá tendências na direção da proa."}, "answer": 2}, {"num": 28, "text": "Numa hidrovia interior você se depara com uma placa branca contendo a letra H na cor vermelha. Ela o quer indicar que você deve:", "options": {"1": "Seguir a margem direita da hidrovia.", "2": "Cruzar obliquamente.", "3": "Seguir pela margem esquerda da hidrovia.", "4": "Seguir pelo centro da hidrovia.", "5": "Trocar de margem."}, "answer": 4}, {"num": 29, "text": "O grande criador e iniuenciador dos fenômenos meteorológicos sobre a superwcie da terra é:", "options": {"1": "O Sol.", "2": "O ar atmosférico.", "3": "A temperatura do planeta.", "4": "O solo.", "5": "O calor emanado da terra."}, "answer": 1}, {"num": 30, "text": "Quando uma frente fria se aproxima podemos prever que o tempo:", "options": {"1": "Bom, conMnuará bom.", "2": "Ficará bom por muitos dias.", "3": "Mudará para pior.", "4": "Ruim, vai melhorar.", "5": "Mudará para melhor."}, "answer": 3}, {"num": 31, "text": "Se carregarmos uma embarcação miúda com excesso de peso, o que acontecerá com ela?", "options": {"1": "A reserva de iutuabilidade será manMda.", "2": "O deslocamento não será alterado.", "3": "O pontal será alterado.", "4": "A borda livre diminuirá.", "5": "O calado diminuirá."}, "answer": 4}, {"num": 32, "text": "Se um barco está abicado, ele está com:", "options": {"1": "Muito peso na proa e popa e pouco peso a meia nau.", "2": "Muito peso na popa e pouco peso na proa.", "3": "Muito peso a meia nau e pouco peso na proa e popa.", "4": "Muito peso na proa e pouco peso na popa.", "5": "Muito peso na quilha e leve na proa."}, "answer": 4}, {"num": 33, "text": "Segundo o arMgo 4º da Lei Federal 9.537/97 – LESTA – a Autoridade MaríMma tem poderes para criar normas complementares para regulamentar diversos aspectos da navegação. Estas Normas da Autoridade MaríMma são chamadas de:", "options": {"1": "NORIP", "2": "NPCP", "3": "NORTEC", "4": "NORMAM", "5": "NORMB"}, "answer": 4}, {"num": 34, "text": "De acordo com o Regulamento Internacional Para Evitar Abalroamentos (RIPEAM), em uma condição de visibilidade restrita, você ouve toques de sino rápidos durante cinco segundos em intervalos não superiores a um minuto. Isso signiZca que há uma embarcação:", "options": {"1": "De propulsão mecânica parada sob máquinas.", "2": "De propulsão mecânica em movimento.", "3": "No centro do canal.", "4": "De comprimento inferior a cem metros que está encalhada.", "5": "De comprimento inferior a cem metros que está fundeada."}, "answer": 5}, {"num": 35, "text": "De acordo com o Regulamento Internacional pra Evitar Abalroamentos no Mar (RIPEAM), em uma embarcação que navega em um canal estreito que a ultrapassagem não é segura sem a concordância de ambos, qual é a sequência correta de apitos para indicar a intenção de ultrapassagem de outra embarcação por bombordo dela?", "options": {"1": "Um curto, um curto, um longo e um longo.", "2": "Um longo, um curto, um longo e um curto.", "3": "Um longo, um longo, um curto e um curto.", "4": "Um longo e um curto.", "5": "Um longo, um longo e um curto."}, "answer": 3}, {"num": 36, "text": "Não há obrigatoriedade em se cadastrar junto à Autoridade MaríMma os motores de embarcações até:", "options": {"1": "50HP", "2": "120HP", "3": "75HP", "4": "100HP", "5": "150HP"}, "answer": 1}, {"num": 37, "text": "O prazo para requerer transferência de propriedade de uma embarcação inscrita na CP/DL/AG é de:", "options": {"1": "60 dias.", "2": "75 dias.", "3": "30 dias.", "4": "15 dias.", "5": "90 dias."}, "answer": 1}, {"num": 38, "text": "Ao se ouvir um “apito curto”, deve-se entender que há uma embarcação realizando a manobra de:", "options": {"1": "Guinando para bombordo.", "2": "Guinando para boreste.", "3": "Dando a ré.", "4": "Realizando fundeio.", "5": "Suspender."}, "answer": 2}, {"num": 39, "text": "Uma embarcação fundeada deve exibir durante o dia, onde melhor pode ser vista:", "options": {"1": "Três esferas.", "2": "Uma esfera.", "3": "Duas esferas e um cone.", "4": "Um cilindro.", "5": "Dois cones."}, "answer": 2}, {"num": 40, "text": "Navegando próximo de terra, o principal equipamento de comunicação para chamada de emergência é:", "options": {"1": "SSB"}, "answer": 3}], "SIMULADO 01": [{"num": 1, "text": "Embarcações de esporte e recreio de comprimento inferior a 12 metros exibem normalmente:", "options": {"1": "Apenas as Luzes de bordo (verde e encarnada)", "2": "Apenas uma luz circular branca", "3": "Luzes de bordo e uma luz amarela na proa", "4": "Luzes de bordo (verde e encarnada) combinadas e uma luz circular branca", "5": "Luzes de bordo (verde e encarnada) e uma luz branca no bico de proa"}, "answer": 4}, {"num": 2, "text": "Uma embarcação exibindo três esferas dispostas em linha vertical, estará:", "options": {"1": "Com a capacidade de manobra restrita", "2": "Atracada", "3": "Encalhada", "4": "Sem governo", "5": "Fundeada"}, "answer": 3}, {"num": 3, "text": "Se durante o dia eu avistar uma embarcação com um balão preto no mastro, ela estará:", "options": {"1": "Engajada em pesca de arrasto", "2": "Pairando sob máquinas", "3": "Em serviço de dragagem", "4": "Fundeada", "5": "Sem governo"}, "answer": 4}, {"num": 4, "text": "De acordo com o RIPEAM , o holofote pode ser utilizado:", "options": {"1": "Para substituir as luzes de bordos", "2": "Para sinalizar perigo a outra embarcação quando dirigido a ela", "3": "Para se navegar no porto quando estiver com visibilidade restrita", "4": "Em rios estreitos para, á noite iluminar curvas", "5": "Em canais de trafego intenso, para evitar abalroamento, á noite"}, "answer": 4}, {"num": 5, "text": "No balizamento de uma hidrovia um sinal \\ \\X \\ \\ significa:", "options": {"1": "Trocar de margem", "2": "Bifurcação de canal", "3": "Seguir margem", "4": "Seguir no meio do canal", "5": "Proibido parar"}, "answer": 1}, {"num": 6, "text": "Durante o dia, observou-se uma haste em forma de pilar, com duas esferas pretas na sua parte de cima. Nesse caso, estamos diante de:", "options": {"1": "Um perigo isolado", "2": "Uma baliza", "3": "uma bóia cônica", "4": "uma área segura para a navegação", "5": "um balizamento cego"}, "answer": 1}, {"num": 7, "text": "A marca de tope do sinal de águas seguras é", "options": {"1": "Uma esfera encarnada", "2": "Um triângulo encarnado", "3": "Um triângulo verde", "4": "Uma esfera branca", "5": "Um triângulo preto"}, "answer": 1}, {"num": 8, "text": "Os cabos principais de amarração são", "options": {"1": "Lancantes de proa e de popa e travezes", "2": "Lancantes , espringues e retinidas", "3": "Espringues de proa e de popa e retinidas", "4": "Retinidas, espringues e traveses", "5": "Lancantes, espringues e travezes"}, "answer": 5}, {"num": 9, "text": "A regra simples para se determinar a quantidade de amarra que se usa para fundear normalmente é:", "options": {"1": "No mínimo 2 vezes a profundidade local", "2": "No mínimo 3 vezes a profundidade do local", "3": "No mínimo 1,5 vezes a profundidade local", "4": "No mínimo 6 vezes a profundidade local", "5": "No mínimo 4 vezes a profundidade local"}, "answer": 2}, {"num": 10, "text": "Os extintores de CO2 são utilizados prioritariamente em:", "options": {"1": "Incêndios de equipamentos elétricos energizados", "2": "Incêndio s é", "options": {"1": "STCW", "2": "CIS", "3": "IALA", "4": "MARPOL", "5": "SOLAS"}, "answer": 3}, {"num": 22, "text": "As medidas que adotamos em caso de um acidente a bordo para evitar o agravamento de acidentado enquanto nosso barco busca socorro médico definitivo são chamadas tecnicamente de:", "options": {"1": "Atendimento emergencial", "2": "Primeiras providências", "3": "Socorro urgente", "4": "Primeiros socorros", "5": "Atendimento rápido"}, "answer": 4}, {"num": 23, "text": "De acordo com a NORMAM-211, estão dispensados de apresentar habilitação náutica apenas:", "options": {"1": "os condutores de embarcações menores que 5m de comprimento", "2": "os condutores de barcos a vela menores de 5 m de comprimento", "3": "os condutores de dispositivos flutuantes sem motorização quando na atividade de esporte e recreio", "4": "os condutores de moto aquática", "5": "os condutores de dispositivos flutuantes tipo banana –boat"}, "answer": 3}, {"num": 24, "text": "De acordo com o Regulamento Internacional Para evitar Abalroamento no Mar(RIPEAM), aluz de alcançado na popa de um barco co mais de 50 metros de comprimento tem um ângulo( setor) de visibilidade de:", "options": {"1": "135° com o centro na popa", "2": "315° com o centro na popa", "3": "112,5° com o centro na popa", "4": "212,5° com o centro na popa", "5": "22,5° com o centro na popa"}, "answer": 1}, {"num": 25, "text": "Dentre as opções abaixo, uma bóia circular dotada a bordo tem como finalidade", "options": {"1": "Servir de apoio para mergulho amador", "2": "Apoio em caso de reboque de ski-aquático", "3": "Marcar local de fundeio", "4": "Lazer das crianças quando na água", "5": "Ser jogada para um náufrago"}, "answer": 5}, {"num": 26, "text": "Diz –se que combustíveis voláteis são aqueles que;", "options": {"1": "Precisam estar acima de 20°C para liberar gases", "2": "Leberam gases mesmo congelados", "3": "Tem grande poder calorífico", "4": "Liberam gases na temperatura ambiente", "5": "São armazenados em t a que lado a proa tende a guinar?", "options": {"1": "Boreste rapidamente", "2": "Bombordo lentamente", "3": "Boreste muito lentamente", "4": "Boreste lentamente", "5": "Bombordo muito rapidamente"}, "answer": 4}, {"num": 10, "text": "Qual das correlações abaixo está totalmente correta?", "options": {"1": "Través é um dos bordos da embarcação, boreste é o lado direito da embarcação,bombordo é o lado esquerdo da embarcação", "2": "Través é o lado direito da embarcação, avante é a parte da frente da embarcação, e a ré é a parte de trás da embarcação", "3": "Boreste é o lado esquerdo da embarcação, bombordo o lado direito da embarcação, a vante fica na frente e a ré fica atrás", "4": "Boreste é o lado direito da embarcação, bombordo é o lado esquerdo da embarcação, a vante fica na frente e a ré fica atrás", "5": "Alheta é um dos bordos da embarcação, boréste é o lado direito da embarcação, bombordo é o lado esquerdo da embarcação"}, "answer": 4}, {"num": 11, "text": "São equipamentos de combate a incêndio mais comumente a bordo das embarcações de esporte e recreio:", "options": {"1": "Extintores portáteis", "2": "Ampolas de halon", "3": "Sistemas fixos de espuma mecânica", "4": "Mangueiras de esguichos", "5": "Sistemas fixos de CO2"}, "answer": 1}, {"num": 12, "text": "Devo ter a bordo sempre extintores portáteis:", "options": {"1": "Próximo ao convés principal", "2": "Em bom estado de conservação visual", "3": "Com revisões anuais dentro da validade", "4": "Em número determinado, de acordo com a lotação da embarcação", "5": "Para combater incêndios classe A"}, "answer": 3}, {"num": 13, "text": "É comum se ter incêndio a bordo decorrente de material elétrico mal especificado como:", "options": {"1": "Disjuntores antichama", "2": "Disjuntores com dupla finalidade", "3": "Cabos elétricos antichama", "4": "Disjuntores bem dimensionados", "5": "Disjuntores que provocam grandes centelhas"}, "answer": 5}, {"num": 14, "text": "Para se utilizar o extintor de espuma, deve-se:", "options": {"1": "Abrir a válvula de acionamento", "2": "Virar o extintor, com a tampa para baixo, e dirigir o jato sobre a base da chama", "3": "Retirar o pino de segurança e direcioná-lo sobre os equipamentos elétricos", "4": "Apertar o gatinho e direcionar o jato para as chamas", "5": "Apertar o gatilho e direcioná-lo sobre os líquido inflamáveis"}, "answer": 2}, {"num": 15, "text": "Os sistemas fixos de combate a incêndio são:", "options": {"1": "Sistemas existentes apenas em navios de grande porte", "2": "Sistemas com difusores fixos", "3": "Sistemas acoplados a rede de aguada", "4": "Sistemas somente acionados no local de uso", "5": "Sistemas com mangueiras e esguichos"}, "answer": 2}, {"num": 16, "text": "Para imobilizar o braço, eu devo deixá-lo:", "options": {"1": "Não há preocupação quanto a posição", "2": "Esticado", "3": "Dobrado, junto ao corpo", "4": "Na posição que quebrou", "5": "Em qualquer posição"}, "answer": 3}, {"num": 17, "text": "A vitima de choque elétrico precisa:", "options": {"1": "De bebida quente e doce", "2": "Ser retirada do local, puxando-a do contato com a corrente elétrica", "3": "Ser afastada do contato com a corrente elétrica, utilizando material não condutor de eletricidade", "4": "Ser atendida de imediato, com a remoção do local para lugar arejado", "5": "Ser afastada do local de risco, antes de aquecermos seu corpo"}, "answer": 3}, {"num": 18, "text": "Como aplicar o torniquete?", "options": {"1": "Utilizando qualquer isolante, juntamente com uma pomada anti-inflamatória", "2": "Utilizando uma madeira amarrada no local, por tiras de pano grosso", "3": "Utilizando um pano grande sobre a pressão, no local da hemorragia", "4": "Utilizando um cabo de fibra sobre a pressão, no local da hemorragia", "5": "Utilizando um pano largo e um pedaço de madeira ou metálico uma chave de fenda, que se fará fixar ao pano, por meio de um nó e torcendo-o, a pressão o pano interromperá a hemorragia"}, "answer": 5}, {"num": 19, "text": "Para que serve o colete salva-vidas que deverá ser guardado a bordo na quantidade exigida pela Legislação?", "options": {"1": "Para ser vestido em caso de práticas desportivas náuticas", "2": "Para ser utilizado como meio de flutuação, quando o passageiro desejar pular na água para nadar um pouco", "3": "Para ser utilizado, como material de controle de avarias, no caso de acidentes com o casco da embarcação", "4": "Para ser vestido, no caso de incêndio a bordo, como uma roupa de proteção.", "5": "Para ser vestido, no caso de ter que se abandonar a embarcação, para que o náufrago flutue com ele."}, "answer": 5}, {"num": 20, "text": "Não se deve utilizar o colete-salva vidas, nas situações abaixo, exceto:", "options": {"1": "como encosto", "2": "para fazer demonstrações", "3": "como brinquedo", "4": "como apoio", "5": "como travesseiro"}, "answer": 2}, {"num": 21, "text": "Em naufrágios, a quantidade de água estipulada, na Marinha do Brasil, é de :", "options": {"1": "500 ml por dia por pessoa", "2": "700 ml por dia por pessoa", "3": "350 ml por dia por pessoa", "4": "1000 ll por dia por pessoa", "5": "2000 ml por dia por pessoa"}, "answer": 2}, {"num": 22, "text": "O dispositivo utilizado pelo náufrago para chamar atenção, de uso diurno, chama-se:", "options": {"1": "Fumígeno", "2": "Foguete pirotécnico", "3": "Foguete de luz vermelha", "4": "Apito", "5": "Luz estroboscópica"}, "answer": 1}, {"num": 23, "text": "Nunca devemos:", "options": {"1": "Dividir os pesos entre as laterais da embarcação", "2": "Afundar a marca do limite mínimo de flutuação", "3": "Retirar pesos altos da embarcação", "4": "Colocar pesos pequenos, no convés", "5": "Colocar mais eso na parte de baixo que na parte de cima da embarcação"}, "answer": 2}, {"num": 24, "text": "Além de outros fatores, a sobrevivência do náufrago depende do período de permanência em função da temperatura da água do mar. No que diz respeito a temperatura ambiente ( temperatura do ar), seus efeitos sobre o pessoal estão intimamente ligados:", "options": {"1": "As nuvens", "2": "As correntes marinhas", "3": "Á pressão atmosférica", "4": "A velocidade do vento", "5": "Aos sistemas frontais"}, "answer": 4}, {"num": 25, "text": "A reação química que ocorre na presença do combustível, do comburente, da temperatura de ignição, com o desprendimento de luz e calor chama-se:", "options": {"1": "Ebulição", "2": "Ignição", "3": "Combustão", "4": "Evaporação", "5": "Oxidação"}, "answer": 3}, {"num": 26, "text": "A temperatura mínima na qual um combustível desprende gases suficientes para serem inflamados por uma fonte externa de calor, mas não em quantidade suficiente para manter a combustão chama-se:", "options": {"1": "Temperatura de ignição", "2": "Ponto de fulgor", "3": "Ponto de orvalho", "4": "Ponto de ebulição", "5": "Ponto de detonação"}, "answer": 2}, {"num": 27, "text": "A primeira providência do navegante diante a uma pessoa gravemente acidentada a bordo será:", "options": {"1": "Verificar a respiração", "2": "Aliviar a dor", "3": "Verificar os batimentos cardíacos", "4": "Aplicar massagem cardíaca", "5": "Verificar as queimaduras"}, "answer": 1}, {"num": 28, "text": "De acordo com o regulamento Internacional Para evitar abalroamento no Mar (RIPEAM), Durante a noite, quando você avista uma forte luz encarnada vinda da direção de uma embarcação, provavelmente um artefato pirotécnico, o que significa?", "options": {"1": "Que a embarcação está com manobra restrita", "2": "Que a embarcação está com manobra restrita devido o seu calado", "3": "Que a embarcação está sem governo, temporariamente", "4": "Que a embarcação está em perigo e necessita auxílio", "5": "Que é uma manobra com aeronaves"}, "answer": 4}, {"num": 29, "text": "É correto afirmar qu a medida que vamos retirando peso de bordo:", "options": {"1": "A borda livre e o calado permanecem inalterados", "2": "Somente a borda livre aumenta", "3": "Somente o calado aumenta", "4": "A borda livre diminui e o calado aumenta", "5": "A borda livre volvimento cirúrgico", "3": "Enrolamento", "4": "Redução óssea", "5": "Tensionamento muscular"}, "answer": 1}, {"num": 36, "text": "Segundo o artigo 4° da lei federal 9.537/97 – LESTA – a autoridade Marítima tem poderes para criar normas complementares para regulamentar diversos aspectos da navegação. Estas normas da autoridade Marítima são chamadas de:", "options": {"1": "NORMB", "2": "NORTEC", "3": "NORIP", "4": "NPCP", "5": "NORMAM"}, "answer": 5}, {"num": 37, "text": "Todos os sinais náuticos chamados de sinais Cardinais têm as cores", "options": {"1": "Encarnado e preto", "2": "Verde e amarelo", "3": "Preto e branco", "4": "Preto e amarelo", "5": "Encarnado e verde"}, "answer": 4}, {"num": 38, "text": "Um barco atracado em local de grande amplitude de maré deve ter cuidado de:", "options": {"1": "Manter espias tesadas na maré baixa", "2": "Manter as espias folgadas na maré alta", "3": "Sempre folgar as espias em qualquer situação", "4": "Controlar as espias de acordo com a maré", "5": "Sempre tesar as espias em qualquer situação"}, "answer": 4}, {"num": 39, "text": "Um corpo total ou parcialmente mergulhado num liquido é submetido á ação de uma força de intensidade igual ao peso do volume do liquido deslocado pelo corpo, de direção vertical, do sentido de baixo para cima. Estamos nos referindo a (ao)", "options": {"1": "Lei de Newtom", "2": "Peso na água doce,", "3": "Empuxo, que é igual ao Deslocamento", "4": "Principio de Torricelli", "5": "Pressão no casco devida pelo volume"}, "answer": 3}, {"num": 40, "text": "Uma pessoa que passou longo tempo em ambientes aquecidos poderá ser vítima de:", "options": {"1": "Hipotermia", "2": "Intermação", "3": "Choque anafilático", "4": "Hemostasia", "5": "Insolação"}, "answer": 2}], "SIMULADO 04": [{"num": 1, "text": "Uma bóia, à noite, emitindo uma luz amarela, poderá significar:", "options": {"1": "Limites de canal", "2": "Águas seguras", "3": "Área de recreação", "4": "Uma bifurcação de canal", "5": "Um perigo isolado"}, "answer": 3}, {"num": 2, "text": "São sinais de balizamento , exceto:", "options": {"1": "Sinais de perigo isolado e sinais cardinais", "2": "Sinais de emergência e sinais de espera", "3": "Sinais laterais e cardinais", "4": "Sinais laterais e sinais especiais", "5": "Sinais cardinais e sinais laterais"}, "answer": 2}, {"num": 3, "text": "O que vem ser tensa?", "options": {"1": "Ondulações que geram perfis diferenciados do fundo", "2": "Tipo de fundo (qualidade)", "3": "Tipo de âncora", "4": "Peça que liga a âncora à amarra", "5": "Tipo de material que fica no fundo, para segurar a embarcação"}, "answer": 2}, {"num": 4, "text": "O extintor de água deve ser utilizado no combate a incêndios em:", "options": {"1": "Metais inflamáveis", "2": "Materiais sólidos inflamáveis", "3": "Paióis de tinta", "4": "Líquidos inflamáveis", "5": "Equipamento e redes elétricas"}, "answer": 2}, {"num": 5, "text": "Os incêndios que ocorrem em líquidos inflamáveis, tais como gasolina, óleo diesel, querosene, entre outros são denominados:", "options": {"1": "Incêndios classe B", "2": "Incêndios classe E", "3": "Incêndios classe A", "4": "Incêndios classe C", "5": "Incêndios classe D"}, "answer": 1}, {"num": 6, "text": "A água salgada não deve ser utilizada na extinção de incêndios classe C por:", "options": {"1": "Ter pouco poder de abafamento", "2": "Ser adiabática", "3": "Ter pouco poder de resfriamento", "4": "Ser boa condutora de eletricidade", "5": "Ter pouca capacidade oxidante"}, "answer": 4}, {"num": 7, "text": "Caso seja verificado que, após ter feito a respiração boca a boca, o coração da vítima também não está batendo, o procedimento correto será?", "options": {"1": "Parar os procedimentos pois a pessoa faleceu", "2": "Continuar a respiração até ela respirar sozinha", "3": "Esperar alguns segundos e verificar novamente", "4": "Fazer massagem cardíaca externa", "5": "Uma massagem nos punhos do paciente"}, "answer": 4}, {"num": 8, "text": "O que deve ser tentado no caso de para // ===== STATE =====
let currentSection = null;
let questions = [];
let currentIdx = 0;
let userAnswers = {};   // idx -> chosen option num (int)
let answeredState = {}; // idx -> 'correct' | 'wrong' | null
let scoreCorrect = 0;
let scoreWrong = 0;

// ===== HOME =====
function buildHome() {
  const grid = document.getElementById('section-grid');
  grid.innerHTML = '';
  const sections = Object.keys(QUIZ_DATA);
  sections.forEach(name => {
    const isProva = name.startsWith('PROVA');
    const count = QUIZ_DATA[name].length;
    const btn = document.createElement('button');
    btn.className = 'section-btn ' + (isProva ? 'prova' : 'simulado');
    btn.innerHTML = `
      <div class="btn-type">${isProva ? '📋 Prova' : '📝 Simulado'}</div>
      <div class="btn-name">${name}</div>
      <div class="btn-count">${count} questões</div>
    `;
    btn.onclick = () => startQuiz(name);
    grid.appendChild(btn);
  });
}

function goHome() {
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
}

// ===== QUIZ =====
function startQuiz(sectionName) {
  currentSection = sectionName;
  questions = QUIZ_DATA[sectionName];
  currentIdx = 0;
  userAnswers = {};
  answeredState = {};
  scoreCorrect = 0;
  scoreWrong = 0;
  document.getElementById('score-correct').textContent = '0';
  document.getElementById('score-wrong').textContent = '0';
  document.getElementById('quiz-section-title').textContent = sectionName;
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-result').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  const answered = Object.keys(answeredState).length;
  const pct = Math.round(((currentIdx) / total) * 100);

  document.getElementById('q-counter').textContent = `Pergunta ${currentIdx + 1} de ${total}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = `QUESTÃO ${q.num}`;
  document.getElementById('q-text').textContent = q.text;

  // Options
  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const opts = q.options;
  const labels = ['A','B','C','D','E'];
  [1,2,3,4,5].forEach((num, i) => {
    if (!opts[String(num)]) return;
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.num = num;
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opts[String(num)]}</span>`;
    btn.onclick = () => selectOption(num);
    optList.appendChild(btn);
  });

  // Restore state if already answered
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  if (answeredState[currentIdx] !== undefined) {
    applyAnsweredState(currentIdx);
  }

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  const isLast = currentIdx === total - 1;
  document.getElementById('btn-next').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('btn-finish').style.display = isLast ? 'inline-block' : 'none';
  document.getElementById('btn-next').disabled = false;
}

function selectOption(chosenNum) {
  if (answeredState[currentIdx] !== undefined) return; // already answered
  const q = questions[currentIdx];
  const correct = q.answer;
  const isCorrect = chosenNum === correct;
  userAnswers[currentIdx] = chosenNum;
  answeredState[currentIdx] = isCorrect ? 'correct' : 'wrong';
  if (isCorrect) {
    scoreCorrect++;
    document.getElementById('score-correct').textContent = scoreCorrect;
  } else {
    scoreWrong++;
    document.getElementById('score-wrong').textContent = scoreWrong;
  }
  applyAnsweredState(currentIdx);
}

function applyAnsweredState(idx) {
  const q = questions[idx];
  const chosen = userAnswers[idx];
  const correct = q.answer;
  const isCorrect = answeredState[idx] === 'correct';

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(btn => {
    const num = parseInt(btn.dataset.num);
    btn.disabled = true;
    if (num === correct) {
      btn.classList.add('correct-answer');
    } else if (num === chosen && !isCorrect) {
      btn.classList.add('wrong-answer');
    } else {
      btn.classList.add('dimmed');
    }
  });

  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    fb.className = 'feedback-box correct show';
    document.getElementById('feedback-icon').textContent = '✅';
    document.getElementById('feedback-text').textContent = 'Correto! Muito bem!';
  } else {
    const labels = ['A','B','C','D','E'];
    const correctLabel = labels[correct - 1];
    fb.className = 'feedback-box wrong show';
    document.getElementById('feedback-icon').textContent = '❌';
    document.getElementById('feedback-text').textContent = `Incorreto. A resposta certa é a alternativa ${correctLabel}.`;
  }
}

function nextQ() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

// ===== RESULT =====
function showResult() {
  const total = questions.length;
  const skipped = total - Object.keys(userAnswers).length;
  const pct = Math.round((scoreCorrect / total) * 100);

  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('result-section-name').textContent = currentSection;
  document.getElementById('result-score').textContent = scoreCorrect;
  document.getElementById('result-of').textContent = `de ${total} questões`;
  document.getElementById('result-pct').textContent = pct + '% de acerto';
  document.getElementById('rb-correct').textContent = scoreCorrect;
  document.getElementById('rb-wrong').textContent = scoreWrong;
  document.getElementById('rb-skip').textContent = skipped;

  const scoreEl = document.getElementById('result-score');
  scoreEl.className = 'result-score';
  if (pct >= 70) scoreEl.classList.add('');
  else if (pct >= 50) scoreEl.classList.add('mid');
  else scoreEl.classList.add('low');

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = 'Excelente! Você está muito bem preparado para a prova!'; }
  else if (pct >= 70) { emoji = '⚓'; msg = 'Bom resultado! Continue praticando para garantir a aprovação.'; }
  else if (pct >= 50) { emoji = '🚢'; msg = 'Resultado mediano. Revise os conteúdos em que errou e tente novamente.'; }
  else { emoji = '🌊'; msg = 'Ainda há muito para estudar. Não desanime — revise e refaça a prova!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-message').textContent = msg;

  // Detail list
  const dl = document.getElementById('detail-list');
  dl.innerHTML = '';
  const labels = ['A','B','C','D','E'];
  questions.forEach((q, i) => {
    const chosen = userAnswers[i];
    const correct = q.answer;
    const state = answeredState[i];
    if (state === undefined) return; // skipped, don't show
    const div = document.createElement('div');
    div.className = 'detail-item ' + (state === 'correct' ? 'c' : 'e');
    const chosenLabel = chosen ? labels[chosen-1] : '—';
    const correctLabel = labels[correct-1];
    div.innerHTML = `
      <div class="di-q">${state === 'correct' ? '✓' : '✗'} Q${q.num}: ${q.text.substring(0,80)}${q.text.length>80?'...':''}</div>
      <div class="di-a">Sua resposta: ${chosenLabel} ${state==='wrong' ? '| Correta: '+correctLabel : ''}</div>
    `;
    dl.appendChild(div);
  });
}

function toggleDetail() {
  const dl = document.getElementById('detail-list');
  dl.classList.toggle('open');
  const btn = document.querySelector('.detail-toggle');
  btn.textContent = dl.classList.contains('open') ? '▲ Ocultar detalhes' : '▼ Ver detalhes por questão';
}

function restartQuiz() {
  startQuiz(currentSection);
}

// Init
buildHome();
</script>
</body>
</html>
